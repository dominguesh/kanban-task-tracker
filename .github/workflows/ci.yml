name: Build and Push to Docker Hub

# Runs on every push to main
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (frontend & backend)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Audit frontend
        working-directory: frontend
        run: npm ci && npm audit --audit-level=moderate

      - name: Audit backend
        working-directory: backend
        run: npm ci && npm audit --audit-level=moderate

  build-and-push:
    needs: npm-audit
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # docker/login-action@v4.1.0 (Node 24 runtime — replaces v3)
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker/build-push-action@v7.1.0 (Node 24 runtime — replaces v5)
      - name: Build and Push Backend
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kanban-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kanban-backend:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kanban-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kanban-frontend:${{ github.sha }}
