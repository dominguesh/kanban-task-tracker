# Merge overlay: publishes Postgres on the host at 127.0.0.1:5432 for external GUI clients.
# Prefer keeping Postgres off the host surface when you only use the backend container.
#
# Usage:
#   docker compose -f docker-compose.dev.yml -f docker-compose.dev.db-host.yml up -d

services:
  db:
    ports:
      # Bind to loopback only — not the LAN — when exposing Postgres to host GUI clients
      - "127.0.0.1:5432:5432"
